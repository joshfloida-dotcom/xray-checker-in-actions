name: Run xray-checker (Safe & Optimized)

on:
  workflow_dispatch:
    inputs:
      args:
        description: "Аргументы для ручного запуска (оставь пустым для дефолтного чека)"
        required: false
        default: ""
  schedule:
    - cron: "0 */2 * * *"

jobs:
  run-xray-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 1: Умный сбор (Base64), очистка от мусора и случайная выборка 2000 конфигов
      - name: Advanced Aggregate, Clean and Sample
        run: |
          python3 - << 'EOF'
          import urllib.request
          import re
          import random
          import base64

          SOURCES = [
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_1.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_2.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_3.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_4.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_5.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_6.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_7.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_8.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_9.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_10.txt"
          ]

          SUPPORTED_PROTOCOLS = ("vmess://", "vless://", "trojan://", "ss://", "ssr://", "hy2://", "hysteria2://", "tuic://")
          proxy_pattern = re.compile(r'(?:vless|vmess|ss|ssr|trojan|hy2|hysteria2|tuic)://[^\s]+')
          uuid_pattern = re.compile(r'^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$')

          unique_configs = set()

          def decode_and_extract(raw_text):
              content = raw_text.strip()
              if not content:
                  return []
              if any(p in content for p in SUPPORTED_PROTOCOLS):
                  return [m.strip() for m in proxy_pattern.findall(content)]
              try:
                  padding = len(content) % 4
                  if padding:
                      content += "=" * (4 - padding)
                  decoded = base64.b64decode(content).decode("utf-8", errors="ignore")
                  return [m.strip() for m in proxy_pattern.findall(decoded)]
              except:
                  return []

          def is_valid_config(config):
              if len(config) > 800 or len(config) < 15:
                  return False
              if config.startswith('vless://'):
                  try:
                      uuid_part = config.split('://')[1].split('@')[0]
                      if not uuid_pattern.match(uuid_part):
                          return False
                  except:
                      return False
              return True

          print("[*] Запуск глубокого парсинга подписок...")
          for url in SOURCES:
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=15) as response:
                      raw_data = response.read().decode('utf-8', errors='ignore')
                      extracted = decode_and_extract(raw_data)
                      for config in extracted:
                          if is_valid_config(config):
                              unique_configs.add(config)
              except Exception as e:
                  print(f"[!] Не удалось обработать источник {url}: {e}")

          unique_list = list(unique_configs)
          total_found = len(unique_list)
          print(f"[+] Успешно отфильтровано и очищено уникальных конфигов: {total_found}")

          CHECK_LIMIT = 2000
          if total_found > CHECK_LIMIT:
              selected_configs = random.sample(unique_list, CHECK_LIMIT)
              print(f"[*] Защита активна: выбрано случайных {CHECK_LIMIT} серверов из {total_found}")
          else:
              selected_configs = unique_list
              print(f"[*] База небольшая ({total_found}), проверяем полностью")

          with open("clean_proxies.txt", "w", encoding="utf-8") as f:
              for config in selected_configs:
                  f.write(config + "\n")
          EOF

      # Шаг 2: Официальный метод установки бинарника из документации
      - name: Install Xray Checker
        run: |
          curl -sL -o - $(curl -s https://api.github.com/repos/kutovoys/xray-checker/releases/latest | grep "browser_download_url.*linux-amd64.tar.gz" | cut -d'"' -f4) | tar -xz
          chmod +x xray-checker

      # Шаг 3: Высокоскоростной запуск с использованием file://
      - name: Execute Check
        env:
          SUBSCRIPTION_URL: "file://${{ github.workspace }}/clean_proxies.txt"
          METRICS_PUSH_URL: ${{ secrets.PUSH_URL }}
          INSTANCE: ${{ secrets.INSTANCE || 'github-actions-sampled' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.args }}" ]; then
            ./xray-checker ${{ github.event.inputs.args }}
          else
            ./xray-checker \
              --subscription-url="$SUBSCRIPTION_URL" \
              --metrics-push-url="$METRICS_PUSH_URL" \
              --metrics-instance="$INSTANCE" \
              --run-once || echo "Проверка завершена"
          fi
