- name: Aggregate and Validate
        run: |
          python3 - << 'EOF'
          import urllib.request
          import re
          import random
          import base64
          import json

          SOURCES = [
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_1.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_2.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_3.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_4.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_5.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_6.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_7.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_8.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_9.txt",
              "https://raw.githubusercontent.com/capitainblack/freetm3/refs/heads/main/configs/sub_10.txt"
          ]

          UUID_RE = re.compile(
              r'^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
          )
          HOST_RE = re.compile(
              r'^([a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)*[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?$|'
              r'^(\d{1,3}\.){3}\d{1,3}$'
          )
          IPV6_RE = re.compile(r'^[0-9a-fA-F:]+$')
          # Регулярка для быстрого поиска непечатаемых символов (исключая \n, \r, \t)
          CONTROL_CHARS_RE = re.compile(r'[\x00-\x08\x0b\x0c\x0e-\x1f]')

          def decode_subscription(content):
              content = content.strip()
              if "://" not in content:
                  try:
                      # Поддержка URL-safe Base64
                      content = content.replace("-", "+").replace("_", "/")
                      missing_padding = len(content) % 4
                      if missing_padding:
                          content += '=' * (4 - missing_padding)
                      return base64.b64decode(content).decode('utf-8', errors='ignore')
                  except Exception:
                      return content
              return content

          def has_garbage(link):
              """Проверяем наличие битых UTF-8 маркеров, двойного URL-encoding и непечатаемых символов."""
              if not link or len(link) < 15:
                  return True
              if "\ufffd" in link:
                  return True
              if "%2525" in link or "%25%25" in link:
                  return True
              if len(CONTROL_CHARS_RE.findall(link)) > 3:
                  return True
              return False

          def parse_host_port(server_str):
              """Универсальный парсер host:port с поддержкой IPv6"""
              parts = re.split(r'[?#]', server_str, maxsplit=1)
              host_port_str = parts[0]
              
              if host_port_str.startswith('['):
                  try:
                      end_bracket = host_port_str.index(']')
                      host = host_port_str[1:end_bracket]
                      rest = host_port_str[end_bracket+1:]
                      if not rest.startswith(':'):
                          return None, None
                      port_str = rest[1:]
                      if not IPV6_RE.match(host):
                          return None, None
                  except ValueError:
                      return None, None
              else:
                  if ":" not in host_port_str:
                      return None, None
                  host, port_str = host_port_str.split(":", 1)
                  if not HOST_RE.match(host):
                      return None, None
                      
              if not port_str.isdigit() or not (1 <= int(port_str) <= 65535):
                  return None, None
                  
              return host, port_str

          def is_valid_vmess(link):
              try:
                  payload = link.split("://", 1)[1].split('#')[0]
                  # Поддержка URL-safe Base64 в vmess
                  payload = payload.replace("-", "+").replace("_", "/")
                  if not payload.startswith('{'):
                      missing_padding = len(payload) % 4
                      if missing_padding:
                          payload += '=' * (4 - missing_padding)
                      payload = base64.b64decode(payload, validate=True).decode('utf-8', errors='ignore')
                  data = json.loads(payload)
                  if not data.get("add") or not data.get("id"):
                      return False
                  return bool(UUID_RE.match(str(data.get("id", ""))))
              except Exception:
                  return False

          def is_valid_vless(link):
              try:
                  body = link.split("://", 1)[1].split('#')[0]
                  if "@" not in body:
                      return False
                  
                  creds, server = body.split("@", 1)
                  creds = creds.strip()
                  server = server.strip()
                  
                  if not UUID_RE.match(creds):
                      return False
                  
                  host, port = parse_host_port(server)
                  if host is None:
                      return False
                  
                  return True
              except Exception:
                  return False

          def is_valid_trojan(link):
              try:
                  body = link.split("://", 1)[1].split('#')[0]
                  if "@" not in body:
                      return False
                  
                  password, server = body.split("@", 1)
                  password = password.strip()
                  server = server.strip()
                  
                  if not password or len(password) < 1:
                      return False
                  if "\ufffd" in password:
                      return False
                  
                  host, port = parse_host_port(server)
                  if host is None:
                      return False
                  
                  return True
              except Exception:
                  return False

          def is_valid_ss(link):
              try:
                  body = link.split("://", 1)[1].split('#')[0]
                  
                  # Попытка декодировать целиком (legacy формат)
                  if "@" not in body and re.match(r'^[A-Za-z0-9+/=_-]+$', body):
                      try:
                          temp_body = body.replace("-", "+").replace("_", "/")
                          missing_padding = len(temp_body) % 4
                          if missing_padding:
                              temp_body += '=' * (4 - missing_padding)
                          body = base64.b64decode(temp_body, validate=True).decode('utf-8', errors='ignore')
                      except Exception:
                          pass

                  if "@" not in body:
                      return False
                      
                  userinfo, server = body.split("@", 1)
                  server = server.strip()
                  
                  # Попытка декодировать только userinfo (SIP002 формат)
                  if re.match(r'^[A-Za-z0-9+/=_-]+$', userinfo):
                      try:
                          temp_userinfo = userinfo.replace("-", "+").replace("_", "/")
                          missing_padding = len(temp_userinfo) % 4
                          if missing_padding:
                              temp_userinfo += '=' * (4 - missing_padding)
                          decoded = base64.b64decode(temp_userinfo, validate=True).decode('utf-8', errors='ignore')
                          if ':' in decoded:
                              userinfo = decoded
                      except Exception:
                          pass
                  
                  if ':' not in userinfo:
                      return False
                      
                  method, password = userinfo.split(':', 1)
                  
                  if not re.match(r'^[a-zA-Z0-9_\-]+$', method):
                      return False
                  if not password or "\ufffd" in password:
                      return False
                  
                  host, port = parse_host_port(server)
                  if host is None:
                      return False
                  
                  return True
              except Exception:
                  return False

          unique_configs = set()
          total_found = 0

          print("[*] Скачивание и фильтрация конфигов...")

          for url in SOURCES:
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=15) as response:
                      raw_content = response.read().decode('utf-8', errors='ignore')
                      content = decode_subscription(raw_content)
                      
                      matches = re.findall(
                          r'(?:vmess|vless|ss|trojan)://[^\s\'"<>]+(?<![.,)\]}>])',
                          content
                      )
                      total_found += len(matches)

                      for match in matches:
                          match = match.strip()
                          if has_garbage(match):
                              continue
                          
                          if match.startswith("vmess://"):
                              if is_valid_vmess(match):
                                  unique_configs.add(match)
                          elif match.startswith("vless://"):
                              if is_valid_vless(match):
                                  unique_configs.add(match)
                          elif match.startswith("ss://"):
                              if is_valid_ss(match):
                                  unique_configs.add(match)
                          elif match.startswith("trojan://"):
                              if is_valid_trojan(match):
                                  unique_configs.add(match)
              except Exception as e:
                  print(f"[!] Ошибка загрузки {url}: {e}")

          unique_list = list(unique_configs)
          random.shuffle(unique_list)
          
          CHECK_LIMIT = 2000
          selected_configs = unique_list[:CHECK_LIMIT]
          
          print(f"[*] Всего ссылок найдено до фильтрации: {total_found}")
          print(f"[+] Успешно очищено и отобрано: {len(selected_configs)}")

          with open("clean_proxies.txt", "w", encoding="utf-8") as f:
              for config in selected_configs:
                  clean_config = config.strip()
                  if clean_config:
                      f.write(clean_config + "\n")
          EOF
